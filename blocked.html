<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Доступ заблокирован</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-body: #0f172a;
      --bg-card: #1e293b;
      --bg-accent: #ef4444;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --text-danger: #fecaca;
      --border: #334155;
      --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      --radius: 16px;
      --font-main: 'Inter', system-ui, -apple-system, sans-serif;
    }

    * { 
      box-sizing: border-box; 
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg-body);
      color: var(--text-main);
      font-family: var(--font-main);
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-image: 
        radial-gradient(circle at 25% 25%, rgba(239, 68, 68, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 75% 75%, rgba(239, 68, 68, 0.05) 0%, transparent 50%);
    }

    .container {
      max-width: 480px;
      width: 100%;
      text-align: center;
      animation: fadeInUp 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 40px 32px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #ef4444, #dc2626, #b91c1c);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .icon-container {
      margin-bottom: 24px;
      position: relative;
    }

    .block-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto;
      background: linear-gradient(135deg, #ef4444, #dc2626);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(239, 68, 68, 0.3);
      animation: iconPulse 3s ease-in-out infinite;
    }

    @keyframes iconPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .block-icon svg {
      width: 40px;
      height: 40px;
      color: white;
      stroke-width: 2.5;
    }

    .title {
      font-size: 28px;
      font-weight: 800;
      color: var(--text-main);
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 18px;
      color: var(--text-danger);
      margin-bottom: 32px;
      font-weight: 600;
    }

    .message {
      font-size: 16px;
      color: var(--text-muted);
      margin-bottom: 32px;
      line-height: 1.7;
    }

    .contact-section {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 32px;
    }

    .contact-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-main);
      margin-bottom: 12px;
    }

    .telegram-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, #0088cc, #006ba6);
      color: white;
      text-decoration: none;
      padding: 12px 20px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 15px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 12px rgba(0, 136, 204, 0.3);
    }

    .telegram-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 136, 204, 0.4);
      background: linear-gradient(135deg, #006ba6, #005a8a);
    }

    .telegram-link svg {
      width: 20px;
      height: 20px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin-bottom: 32px;
    }

    .info-item {
      background: rgba(30, 41, 59, 0.5);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      text-align: left;
    }

    .info-label {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
      font-weight: 500;
    }

    .info-value {
      font-size: 14px;
      color: var(--text-main);
      font-weight: 600;
    }

    .footer-text {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 24px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      margin-top: 20px;
      transition: color 0.3s ease;
    }

    .back-link:hover {
      color: var(--text-main);
    }

    .back-link svg {
      width: 16px;
      height: 16px;
    }

    @media (max-width: 480px) {
      .card {
        padding: 32px 24px;
      }
      
      .title {
        font-size: 24px;
      }
      
      .subtitle {
        font-size: 16px;
      }
      
      .message {
        font-size: 15px;
      }
      
      .block-icon {
        width: 70px;
        height: 70px;
      }
      
      .block-icon svg {
        width: 35px;
        height: 35px;
      }
    }

    /* Анимация появления элементов */
    .card > * {
      animation: fadeInUp 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      animation-fill-mode: both;
    }

    .icon-container { animation-delay: 0.1s; }
    .title { animation-delay: 0.2s; }
    .subtitle { animation-delay: 0.3s; }
    .message { animation-delay: 0.4s; }
    .contact-section { animation-delay: 0.5s; }
    .info-grid { animation-delay: 0.6s; }
    .footer-text { animation-delay: 0.7s; }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <div class="icon-container">
        <div class="block-icon">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <circle cx="12" cy="16" r="1"></circle>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
        </div>
      </div>

      <h1 class="title">Доступ заблокирован</h1>
      <p class="subtitle">Ваш ключ был заблокирован</p>

      <div class="contact-section">
        <div class="contact-title">Для восстановления доступа обратитесь:</div>
        <a href="https://t.me/Chris_kz" class="telegram-link" target="_blank" rel="noopener">
          <svg fill="currentColor" viewBox="0 0 24 24">
            <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
          </svg>
          @Chris_kz
        </a>
      </div>

      <a class='back-link' href='/bind' id='backToBind'>
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
        </svg>
        Вернуться к активации
      </a>
    </div>
  </div>

  <script>
    // Добавляем немного интерактивности
    document.addEventListener('DOMContentLoaded', function() {
      // Анимация иконки при загрузке
      const icon = document.querySelector('.block-icon');
      if (icon) {
        setTimeout(() => {
          icon.style.transform = 'scale(1.1)';
          setTimeout(() => {
            icon.style.transform = 'scale(1)';
          }, 200);
        }, 800);
      }

      // Отслеживание клика по Telegram ссылке
      const telegramLink = document.querySelector('.telegram-link');
      if (telegramLink) {
        telegramLink.addEventListener('click', function() {
          console.log('Telegram link clicked');
        });
      }

      var backLink = document.getElementById('backToBind');
      if (backLink) {
        backLink.addEventListener('click', function(e) {
          e.preventDefault();
          fetch('/.netlify/functions/logout', { credentials: 'include' })
            .finally(function() { // removed; });
        });
      }
    });
  </script>
<script src="anti-capture.js"></script>
</body>
</html>
