    /* =========================
       PREVIEW SKELETON (shimmer)
       ========================= */
    #preview{
      position: relative;
      overflow: hidden;
      touch-action: none; /* для pointer gestures */
    }

    /* Картинка всегда абсолютная - чтобы не было “вспышки” layout/размера */
    .doc-img{
      position: absolute;
      top: 0;
      left: 0;
      opacity: 0;
      transform: translate3d(0, 0, 0) scale3d(1,1,1);
      transition: opacity .18s ease;
      will-change: transform, opacity;
      transform-origin: 0 0;
      user-select: none;
      -webkit-user-drag: none;
      display:block;
      max-width:none;
      max-height:none;
    }
    .doc-img.is-ready{
      opacity: 1;
    }
    .doc-img.no-anim{
      transition: none !important;
    }

    /* оверлей поверх preview */
    .preview-skeleton{
      position: absolute;
      inset: 0;
      z-index: 10;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      transition: opacity .15s ease;
    }
    .preview-skeleton.is-on{
      opacity: 1;
      pointer-events: auto; /* блокируем жесты пока грузится */
    }

    .preview-sk-card{
      position: absolute;
      left: 14px;
      right: 14px;
      top: 12px;
      bottom: 12px;
      border-radius: 12px;
      background: #ECECF1;
      overflow: hidden;
    }

    .preview-sk-card::after{
      content:"";
      position:absolute;
      top:0; left:-55%;
      height:100%;
      width:55%;
      background: linear-gradient(
        90deg,
        rgba(255,255,255,0) 0%,
        rgba(255,255,255,.55) 50%,
        rgba(255,255,255,0) 100%
      );
      transform: skewX(-15deg);
      animation: sk-shimmer 1.05s ease-in-out infinite;
    }

    @keyframes sk-shimmer{
      0%   { left:-55%; }
      100% { left:110%; }
    }

    @media (prefers-reduced-motion: reduce){
      .preview-sk-card::after{ animation:none; display:none; }
      .doc-img{ transition:none; opacity:1; }
    }

  <script>
  if (true) {
    document.addEventListener("DOMContentLoaded", () => {

      // ===== ТАБЫ + ИНДИКАТОР =====
      const tabBtn1 = document.getElementById("tab-btn-1");
      const tabBtn2 = document.getElementById("tab-btn-2");
      const indicator = document.querySelector('.btntab .indicator');

      const doc = document.getElementById("doc");
      const req = document.getElementById("req");

      function updateIndicator() {
        if (!indicator) return;
        indicator.style.transform = tabBtn1.checked ? 'translateX(0%)' : 'translateX(100%)';
      }

      function setActiveTab() {
        if (tabBtn1.checked) {
          doc.classList.add("active");
          req.classList.remove("active");
          restoreDocumentIfAny();
        } else {
          req.classList.add("active");
          doc.classList.remove("active");
          hidePreviewForReq();
        }
        updateIndicator();
      }

      tabBtn1.addEventListener("change", setActiveTab);
      tabBtn2.addEventListener("change", setActiveTab);
      updateIndicator();

      // ===== СВАЙП МЕЖДУ ТАБАМИ =====
      let swipeStartX = 0;
      let swipeStartY = 0;
      let swipeLocked = false;
      const swipeThreshold = 40;
      const container = document.querySelector('.container');

      container.addEventListener('touchstart', function(e) {
        swipeStartX = e.touches[0].clientX;
        swipeStartY = e.touches[0].clientY;
        swipeLocked = false;
      }, { passive: true });

      container.addEventListener('touchmove', function(e) {
        if (swipeLocked) return;
        const dx = e.touches[0].clientX - swipeStartX;
        const dy = e.touches[0].clientY - swipeStartY;
        if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 10) {
          e.preventDefault();
        }
      }, { passive: false });

      container.addEventListener('touchend', function(e) {
        if (swipeLocked) return;
        const dx = e.changedTouches[0].clientX - swipeStartX;
        const dy = e.changedTouches[0].clientY - swipeStartY;
        if (Math.abs(dx) < swipeThreshold || Math.abs(dy) > Math.abs(dx)) return;
        swipeLocked = true;
        if (dx < 0 && tabBtn1.checked) {
          tabBtn2.checked = true;
          setActiveTab();
        } else if (dx > 0 && tabBtn2.checked) {
          tabBtn1.checked = true;
          setActiveTab();
        }
      }, { passive: true });

      // ===== ЗАГРУЗКА + PREVIEW =====
      const input = document.getElementById("idupload");
      const preview = document.getElementById("preview");
      const label = document.getElementById("upload-label");

      // skeleton overlay
      const previewSk = document.getElementById("previewSk");
      function skOn(){
        if (!previewSk) return;
        previewSk.classList.add('is-on');
      }
      function skOff(){
        if (!previewSk) return;
        previewSk.classList.remove('is-on');
      }

      function hidePreviewForReq() {
        if (label) label.style.display = "none";
        const img = preview.querySelector("img");
        if (img) img.remove();
        skOff();
      }

      // ===== KASPI-LIKE VIEWER =====
      let scale = 1;
      let minScale = 1;
      const maxScale = 4;

      let tx = 0;
      let ty = 0;

      let vx = 0;
      let vy = 0;

      let raf = 0;

      const pointers = new Map();
      let lastPinchDist = 0;

      function clamp(v, a, b){ return Math.max(a, Math.min(b, v)); }

      function getLocal(e){
        const r = preview.getBoundingClientRect();
        return { x: e.clientX - r.left, y: e.clientY - r.top };
      }

      function apply(img){
        img.style.transform = `translate3d(${tx}px, ${ty}px, 0) scale3d(${scale}, ${scale}, 1)`;
      }

      function clampPosition(img){
        const pw = preview.clientWidth || 1;
        const ph = preview.clientHeight || 1;

        const iw = (img.naturalWidth || 1) * scale;
        const ih = (img.naturalHeight || 1) * scale;

        if (iw <= pw) {
          tx = (pw - iw) / 2;
        } else {
          const minX = pw - iw;
          tx = clamp(tx, minX, 0);
        }

        if (ih <= ph) {
          ty = 0;
        } else {
          const minY = ph - ih;
          ty = clamp(ty, minY, 0);
        }
      }

      function schedule(){
        if (raf) return;
        raf = requestAnimationFrame(() => {
          raf = 0;
          const img = preview.querySelector("img");
          if (!img) return;
          clampPosition(img);
          apply(img);
        });
      }

      function computeFit(iw, ih){
        const pw = preview.clientWidth || 1;
        const ph = preview.clientHeight || 1;

        minScale = Math.min(pw / (iw || 1), ph / (ih || 1));
        if (!isFinite(minScale) || minScale <= 0) minScale = 1;

        scale = minScale;

        const w = (iw || 1) * scale;
        tx = (pw - w) / 2;
        ty = 0;
      }

      function toImageCoords(px, py){
        return { ix: (px - tx) / scale, iy: (py - ty) / scale };
      }

      function startGesture(){
        const img = preview.querySelector("img");
        if (!img) return;
        img.classList.add("no-anim");
      }

      function endGesture(){
        const img = preview.querySelector("img");
        if (!img) return;
        img.classList.remove("no-anim");
      }

      function inertia(){
        const img = preview.querySelector("img");
        if (!img) return;

        if (Math.abs(vx) < 0.02 && Math.abs(vy) < 0.02) {
          springBack();
          return;
        }

        let decay = 0.92;

        function step(){
          vx *= decay;
          vy *= decay;

          tx += vx * 16;
          ty += vy * 16;

          clampPosition(img);
          apply(img);

          if (Math.abs(vx) < 0.02 && Math.abs(vy) < 0.02) {
            springBack();
            return;
          }
          requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
      }

      function springBack(){
        const img = preview.querySelector("img");
        if (!img) return;
        clampPosition(img);
        apply(img);
      }

      function bindZoomOnce(){
        if (preview.dataset.bound === "1") return;
        preview.dataset.bound = "1";

        preview.addEventListener("pointerdown", (e) => {
          const img = preview.querySelector("img");
          if (!img) return;
          if (previewSk && previewSk.classList.contains('is-on')) return;

          preview.setPointerCapture(e.pointerId);

          const p = getLocal(e);
          pointers.set(e.pointerId, { x: p.x, y: p.y, t: performance.now() });

          vx = 0; vy = 0;
          lastPinchDist = 0;

          startGesture();
        });

        preview.addEventListener("pointermove", (e) => {
          const img = preview.querySelector("img");
          if (!img) return;
          if (!pointers.has(e.pointerId)) return;

          const now = performance.now();
          const p = getLocal(e);

          const prev = pointers.get(e.pointerId);
          pointers.set(e.pointerId, { x: p.x, y: p.y, t: now });

          if (pointers.size === 1) {
            if (scale <= minScale + 0.0001) return;

            const dx = p.x - prev.x;
            const dy = p.y - prev.y;

            tx += dx;
            ty += dy;

            const dt = Math.max(8, now - prev.t);
            vx = dx / dt;
            vy = dy / dt;

            schedule();
            return;
          }

          if (pointers.size === 2) {
            const pts = [...pointers.values()];
            const a = pts[0], b = pts[1];

            const midX = (a.x + b.x) / 2;
            const midY = (a.y + b.y) / 2;

            const dist = Math.hypot(b.x - a.x, b.y - a.y) || 1;
            if (!lastPinchDist) lastPinchDist = dist;

            const factor = dist / lastPinchDist;
            lastPinchDist = dist;

            const newScale = clamp(scale * factor, minScale, maxScale);

            const { ix, iy } = toImageCoords(midX, midY);

            scale = newScale;

            tx = midX - ix * scale;
            ty = midY - iy * scale;

            schedule();
          }
        });

        function endPointer(e){
          pointers.delete(e.pointerId);
          if (pointers.size < 2) lastPinchDist = 0;

          if (pointers.size === 0) {
            endGesture();
            inertia();
          }
        }

        preview.addEventListener("pointerup", endPointer);
        preview.addEventListener("pointercancel", endPointer);

        preview.addEventListener("wheel", (e) => {
          const img = preview.querySelector("img");
          if (!img) return;

          e.preventDefault();

          const r = preview.getBoundingClientRect();
          const cx = e.clientX - r.left;
          const cy = e.clientY - r.top;

          const zoom = e.deltaY > 0 ? 0.9 : 1.1;
          const newScale = clamp(scale * zoom, minScale, maxScale);

          const { ix, iy } = toImageCoords(cx, cy);

          scale = newScale;
          tx = cx - ix * scale;
          ty = cy - iy * scale;

          springBack();
        }, { passive:false });
      }

      // ===== ВАЖНОЕ: без дерганья/зума при появлении =====
      function clearPreviewImage(){
        const old = preview.querySelector("img");
        if (old) old.remove();
      }

      async function showImage(src){
        skOn();
        clearPreviewImage();
        if (label) label.style.display = "none";

        // 1) Грузим/декодим вне DOM (чтобы не было флеша размера)
        const tmp = new Image();
        tmp.decoding = "async";
        tmp.src = src;

        try{
          if (tmp.decode) await tmp.decode();
        }catch(_e){
          // ok
        }

        const iw = tmp.naturalWidth || 1;
        const ih = tmp.naturalHeight || 1;

        // 2) Считаем scale/tx/ty ДО вставки в DOM
        await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
        computeFit(iw, ih);

        // 3) Вставляем уже готовую картинку, сразу с transform
        const img = document.createElement("img");
        img.className = "doc-img";
        img.alt = "";
        img.src = src;

        // сразу ставим transform (никаких “мгновенных зумов”)
        img.style.transform = `translate3d(${tx}px, ${ty}px, 0) scale3d(${scale}, ${scale}, 1)`;

        preview.insertBefore(img, previewSk || null);

        // подстрахуем clamp
        clampPosition(img);
        apply(img);

        bindZoomOnce();

        // 4) Плавно показываем и убираем скелетон
        requestAnimationFrame(() => img.classList.add("is-ready"));
        setTimeout(skOff, 140);
      }

      function restoreDocumentIfAny() {
        const saved = localStorage.getItem("uploadedImage");
        if (saved) {
          showImage(saved);
        } else {
          if (label) label.style.display = "inline-block";
          clearPreviewImage();
          skOff();
        }
      }

      // старт
      tabBtn1.checked = true;
      setActiveTab();

      // upload
      input.addEventListener("change", function () {
        const file = this.files && this.files[0];
        if (!file) return;

        skOn();

        const reader = new FileReader();
        reader.onload = function (e) {
          const src = e.target.result;
          localStorage.setItem("uploadedImage", src);
          showImage(src);
        };
        reader.readAsDataURL(file);
      });

      // реквизиты сохраняем
      document.querySelectorAll('.rekvizit input').forEach((inp, index) => {
        const saved = localStorage.getItem('rekvizit' + index);
        if (saved) inp.value = saved;
        inp.addEventListener('input', () => {
          localStorage.setItem('rekvizit' + index, inp.value);
        });
      });

      // Проверяем, сохранены ли реквизиты
      const isSaved = localStorage.getItem('rekvizitSaved') === 'true';
      const btnSave = document.getElementById('btnSaveRekvizit');
      
      function setRekvizitReadonly(readonly) {
        document.querySelectorAll('.rekvizit input').forEach(inp => {
          inp.readOnly = readonly;
          if (readonly) {
            inp.style.backgroundColor = '#f5f5f5';
            inp.style.color = '#111';
            
            inp.style.cursor = 'not-allowed';
            inp.style.border = '1px solid #ddd';
          } else {
            inp.style.backgroundColor = '';
            inp.style.color = '';
                  inp.style.cursor = '';
            inp.style.border = '';
          }
        });
        
        // Скрываем/показываем кнопки копирования
        document.querySelectorAll('.copy-icon').forEach(icon => {
          icon.style.opacity = readonly ? '0.5' : '1';
          icon.style.pointerEvents = 'auto';
        });
        if (btnSave) {
          const container = document.getElementById('saveButtonContainer');
          if (readonly) {
            container.style.opacity = '0';
            container.style.pointerEvents = 'none';
          } else {
            container.style.opacity = '1';
            container.style.pointerEvents = 'auto';
          }
        }
      }

      // Устанавливаем начальное состояние
      if (isSaved) {
        setRekvizitReadonly(true);
      }

      // ===== КОПИРОВАНИЕ РЕКВИЗИТОВ =====
      let copyToastTimer = null;
      const copyToast = document.getElementById('copyToast');

      document.querySelectorAll('.copy-icon').forEach(icon => {
        icon.style.cursor = 'pointer';
        icon.addEventListener('click', function() {
          const li = icon.closest('li');
          const input = li ? li.querySelector('.rekitem') : null;
          const text = input ? input.value : '';
          // Копирование с fallback для HTTP
          try {
            if (navigator.clipboard && window.isSecureContext) {
              navigator.clipboard.writeText(text);
            } else {
              const ta = document.createElement('textarea');
              ta.value = text;
              ta.style.position = 'fixed';
              ta.style.opacity = '0';
              document.body.appendChild(ta);
              ta.focus();
              ta.select();
              document.execCommand('copy');
              document.body.removeChild(ta);
            }
          } catch(e) {}
          copyToast.style.opacity = '1';
          copyToast.style.pointerEvents = 'auto';
          clearTimeout(copyToastTimer);
          copyToastTimer = setTimeout(() => {
            copyToast.style.opacity = '0';
            copyToast.style.pointerEvents = 'none';
          }, 2000);
        });
      });

      // Обработчик кнопки сохранения
      if (btnSave) {
        btnSave.addEventListener('click', function(e) {
          e.preventDefault();
          
          // Добавляем анимацию нажатия
          this.style.transform = 'scale(0.95)';
          setTimeout(() => {
            this.style.transform = '';
          }, 150);
          
          // Проверяем, что все поля заполнены

          let allFilled = true;
          
          inputs.forEach(inp => {
            if (!inp.value.trim()) {

              inp.style.borderColor = '#ff4444';
              inp.style.animation = 'shake 0.5s ease-in-out';
              setTimeout(() => {
                inp.style.borderColor = '';
                inp.style.animation = '';
              }, 2000);
            }
          });
          
          if (!allFilled) {
            // Создаем стиль для анимации тряски
            if (!document.getElementById('shakeStyle')) {
              const style = document.createElement('style');
              style.id = 'shakeStyle';
              style.textContent = `
                @keyframes shake {

                  25% { transform: translateX(-5px); }
                  75% { transform: translateX(5px); }
                }
              `;
              document.head.appendChild(style);
            }
            
            alert('Пожалуйста, заполните все поля');
            return;
          }
          
          // Анимация успешного сохранения
          this.classList.add('saved');
          const originalText = this.innerHTML;
          this.innerHTML = `
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="save-icon">
              <polyline points="20,6 9,17 4,12"></polyline>
            </svg>
            Сохранено!
          `;
          
          // Сохраняем состояние
          localStorage.setItem('rekvizitSaved', 'true');
          setRekvizitReadonly(true);
          
          // Скрываем кнопку после анимации
          setTimeout(() => {
            this.style.opacity = '0';
            this.style.transform = 'scale(0.8)';
            setTimeout(() => {
              this.style.visibility = 'hidden';
              // Скрываем весь контейнер кнопки, но сохраняем место
              const container = document.getElementById('saveButtonContainer');
              if (container) {
                container.style.opacity = '0';
                container.style.pointerEvents = 'none';
              }
            }, 300);
          }, 1500);
          
          // Показываем уведомление
          const notification = document.createElement('div');
          notification.style.cssText = `
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            padding: 16px 28px;
            border-radius: 12px;
            z-index: 9999;
            font-weight: 600;
            font-size: 15px;
            box-shadow: 0 8px 24px rgba(16, 185, 129, 0.3);
            animation: slideDown 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 10px;
          `;
          notification.innerHTML = `
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20,6 9,17 4,12"></polyline>
            </svg>
            Реквизиты сохранены и защищены от изменений
          `;
          
          // Добавляем анимацию
          if (!document.getElementById('notificationStyle')) {
            const style = document.createElement('style');
            style.id = 'notificationStyle';
            style.textContent = `
              @keyframes slideDown {
                from { 
                  transform: translateX(-50%) translateY(-100%); 
                  opacity: 0; 
                  scale: 0.9;
                }
                to { 
                  transform: translateX(-50%) translateY(0); 
                  opacity: 1; 
                  scale: 1;
                }
              }
              @keyframes slideUp {
                from { 
                  transform: translateX(-50%) translateY(0); 
                  opacity: 1; 
                  scale: 1;
                }
                to { 
                  transform: translateX(-50%) translateY(-100%); 
                  opacity: 0; 
                  scale: 0.9;
                }
              }
            `;
            document.head.appendChild(style);
          }
          
          document.body.appendChild(notification);
          
          setTimeout(() => {
            notification.style.animation = 'slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1)';
            setTimeout(() => {
              notification.remove();
            }, 400);
          }, 3500);
        });
      }

      // ===== QR MODAL =====
      const openBtn = document.querySelector('#btnftr1');
      const overlay = document.getElementById('qrOverlay');
      const closeBtn = document.getElementById('qrClose');
      const backdrop = document.getElementById('qrBackdrop');

      // ===== RANDOM QR CODE (ВСЕГДА РАНДОМНЫЙ) =====
      const qrCodeEl = document.querySelector('.qr-code');

      function genQrCode(len = 6){
        let s = "";
        for (let i = 0; i < len; i++) s += Math.floor(Math.random() * 10);
        return s;
      }

      function setQrCode(){
        if (!qrCodeEl) return;
        qrCodeEl.textContent = genQrCode(6);
      }

      // сгенерить сразу при загрузке
      setQrCode();

      if (openBtn && overlay) {
        openBtn.addEventListener('click', function(e){
          e.preventDefault();
          setQrCode(); // каждый раз новый код при открытии
          overlay.style.display = 'block';
          setTimeout(() => {
            overlay.classList.add('open');
            overlay.setAttribute('aria-hidden', 'false');
            document.body.style.overflow = 'hidden';
          }, 10);
        });

        function closeModal() {
          overlay.classList.remove('open');
          overlay.setAttribute('aria-hidden', 'true');
          setTimeout(() => {
            overlay.style.display = 'none';
            document.body.style.overflow = '';
          }, 300);
        }

        closeBtn.addEventListener('click', closeModal);
        backdrop.addEventListener('click', closeModal);

        document.addEventListener('keydown', function(e){
          if (e.key === 'Escape' && overlay.classList.contains('open')) closeModal();
        });
      }

      // ===== SHARE (2 одинаковых id="btnftr2") =====
      document.querySelectorAll('#btnftr2').forEach((btn) => {
        btn.addEventListener("click", async (e) => {
          e.preventDefault();
          
          // Проверяем, какая это кнопка - документ или реквизиты
          const isDocumentButton = btn.textContent.includes('Отправить документ');
          
          if (isDocumentButton) {
            // Логика для кнопки "Отправить документ" - конвертация в PDF
            await convertImageToPDF();
          } else {
            // Логика для кнопки "Отправить реквизиты" - обычный share
            if (navigator.share) {
              try {
                await navigator.share({
                  title: "тг:KaspiAdd",
                  text: "переходи",
                  url: window.location.href
                });
              } catch (err) {
                console.log("Ошибка", err);
              }
            } else {
              alert("Ваш браузер не поддерживает данную функцию");
            }
          }
        });
      });

      // ===== КОНВЕРТАЦИЯ ИЗОБРАЖЕНИЯ В PDF =====
      async function convertImageToPDF() {
        const img = preview.querySelector("img");
        
        if (!img) {
          alert("Сначала загрузите документ");
          return;
        }

        try {
          // Создаем canvas для получения данных изображения
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          
          // Ждем загрузки изображения если нужно
          await new Promise((resolve) => {
            if (img.complete) {
              resolve();
            } else {
              img.onload = resolve;
            }
          });
          
          // Устанавливаем размеры canvas
          canvas.width = img.naturalWidth;
          canvas.height = img.naturalHeight;
          
          // Рисуем изображение на canvas
          ctx.drawImage(img, 0, 0);
          
          // Получаем данные изображения
          const imgData = canvas.toDataURL('image/jpeg', 0.95);
          
          // Создаем PDF
          const { jsPDF } = window.jspdf;
          const pdf = new jsPDF();
          
          // Вычисляем размеры для PDF (A4 формат)
          const pdfWidth = pdf.internal.pageSize.getWidth();
          const pdfHeight = pdf.internal.pageSize.getHeight();
          
          const imgWidth = img.naturalWidth;
          const imgHeight = img.naturalHeight;
          const ratio = Math.min(pdfWidth / imgWidth, pdfHeight / imgHeight);
          
          const finalWidth = imgWidth * ratio;
          const finalHeight = imgHeight * ratio;
          
          // Центрируем изображение
          const x = (pdfWidth - finalWidth) / 2;
          const y = (pdfHeight - finalHeight) / 2;
          
          // Добавляем изображение в PDF
          pdf.addImage(imgData, 'JPEG', x, y, finalWidth, finalHeight);
          
          // Генерируем имя файла
          const fileName = `document_${new Date().getTime()}.pdf`;
          
          // Создаем blob из PDF
          const pdfBlob = pdf.output('blob');
          
          // Пытаемся отправить через Web Share API
          if (navigator.share && navigator.canShare && navigator.canShare({ files: [new File([pdfBlob], fileName, { type: 'application/pdf' })] })) {
            try {
              const file = new File([pdfBlob], fileName, { type: 'application/pdf' });
              await navigator.share({
                title: 'Документ удостоверения личности',
                text: 'Отправляю документ',
                files: [file]
              });
              
            } catch (err) {
              console.log("Ошибка отправки:", err);
              // Если отправка не удалась, предлагаем скачать
              pdf.save(fileName);
            }
          } else {
            // Если Web Share API не поддерживается, скачиваем файл
            pdf.save(fileName);
          }
          
        } catch (error) {
          console.error('Ошибка конвертации:', error);
          alert("Ошибка при конвертации в PDF. Попробуйте еще раз.");
        }
      }

      // ===== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ДЛЯ УВЕДОМЛЕНИЙ =====
      function showLoadingToast(message) {

        toast.innerHTML = `

        // Добавляем анимацию вращения

          `;
          document.head.appendChild(style);
        }
        
        document.body.appendChild(toast);
        return toast;
      }

      function hideLoadingToast(toast) {
        if (toast && toast.parentNode) {

        toast.innerHTML = `
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20,6 9,17 4,12"></polyline>
          </svg>
          ${message}
        `;
        
        document.body.appendChild(toast);
        
        setTimeout(() => {
          toast.style.animation = 'slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1)';
          setTimeout(() => {
            toast.remove();
          }, 400);
        }, 3000);
      }

      // ===== BACK =====
      const backIcon = document.querySelector('.back-icon');
      if (backIcon) {
        backIcon.style.cursor = 'pointer';
        backIcon.addEventListener('click', function(e) {
          e.preventDefault();
          window.location.href = '../gosu.html';
        });
      }

    });
  }
