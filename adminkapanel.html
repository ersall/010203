<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Панель управления</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: #f1f5f9; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
    .panel { width: 100%; max-width: 720px; background: #fff; border-radius: 24px; box-shadow: 0 4px 32px rgba(0,0,0,.06); overflow: hidden; }
    .panel-header { background: #0f172a; color: #fff; padding: 28px 32px; }
    .panel-header h1 { font-size: 22px; font-weight: 700; letter-spacing: -.5px; }
    .panel-header p { font-size: 13px; color: #94a3b8; margin-top: 4px; }
    .panel-body { padding: 24px 32px; }
    .card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 16px; padding: 24px; margin-bottom: 20px; }
    .card-title { font-size: 15px; font-weight: 700; color: #0f172a; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
    .card-title .icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .icon-green { background: #d1fae5; color: #047857; }
    .icon-blue { background: #dbeafe; color: #1e40af; }
    .icon-red { background: #ffe4e6; color: #be123c; }
    .input-row { display: flex; gap: 10px; flex-wrap: wrap; }
    input, select { flex: 1; min-width: 120px; padding: 14px 16px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 14px; font-family: inherit; background: #fff; transition: all .15s; }
    input:focus, select:focus { outline: none; border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,.1); }
    .btn { padding: 14px 24px; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all .15s; font-family: inherit; white-space: nowrap; }
    .btn-primary { background: #4f46e5; color: #fff; }
    .btn-primary:hover { background: #4338ca; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(79,70,229,.3); }
    .btn-primary:disabled { opacity: .5; transform: none; box-shadow: none; }
    .btn-danger { background: #fff; color: #e11d48; border: 1px solid #fecdd3; }
    .btn-danger:hover { background: #ffe4e6; }
    .btn-outline { background: #fff; color: #334155; border: 1px solid #e2e8f0; }
    .btn-outline:hover { background: #f1f5f9; }
    .btn-sm { padding: 8px 14px; font-size: 12px; }
    .code-display { background: #0f172a; color: #fff; border-radius: 16px; padding: 24px; text-align: center; margin-top: 16px; display: none; }
    .code-display .code { font-size: 42px; font-weight: 700; letter-spacing: 10px; }
    .code-display .meta { font-size: 13px; color: #94a3b8; margin-top: 6px; }
    .code-display .copy-btn { margin-top: 12px; }
    .table-wrap { border: 1px solid #e2e8f0; border-radius: 12px; overflow-x: auto; max-height: 350px; overflow-y: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 12px 16px; background: #f8fafc; color: #64748b; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; position: sticky; top: 0; }
    td { padding: 12px 16px; border-bottom: 1px solid #f1f5f9; color: #334155; }
    tr:hover td { background: #f8fafc; }
    .badge { display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; }
    .badge-active { background: #d1fae5; color: #047857; }
    .badge-expired { background: #f1f5f9; color: #94a3b8; }
    .badge-used { background: #dbeafe; color: #1e40af; }
    .msg { font-size: 13px; color: #64748b; margin-top: 10px; min-height: 20px; }
    .login-box { max-width: 380px; margin: 40px auto; text-align: center; }
    .login-box input { width: 100%; margin-bottom: 12px; }
    .login-box .btn { width: 100%; }
    #panel { display: none; }
    .tabs { display: flex; gap: 4px; margin-bottom: 16px; background: #f1f5f9; border-radius: 12px; padding: 4px; }
    .tab { flex: 1; text-align: center; padding: 10px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; color: #64748b; transition: all .15s; }
    .tab.active { background: #fff; color: #0f172a; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .stat-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .stat-item { flex: 1; min-width: 80px; background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px; text-align: center; }
    .stat-item .stat-num { font-size: 22px; font-weight: 700; color: #0f172a; }
    .stat-item .stat-label { font-size: 11px; color: #94a3b8; margin-top: 2px; }
    @media (max-width: 480px) {
      .panel-body { padding: 16px; }
      .input-row { flex-direction: column; }
      .btn { width: 100%; }
      .stat-row { gap: 6px; }
      .stat-item { min-width: 60px; padding: 10px; }
      .stat-item .stat-num { font-size: 18px; }
    }
  </style>
</head>
<body>

<div class="panel" id="loginBox">
  <div class="panel-header">
    <h1>Панель управления</h1>
    <p>Введите пароль для входа</p>
  </div>
  <div class="panel-body login-box">
    <input type="password" id="pass" placeholder="Пароль администратора">
    <button class="btn btn-primary" onclick="login()">Войти</button>
    <div class="msg" id="msgLogin"></div>
  </div>
</div>

<div class="panel" id="panel">
  <div class="panel-header">
    <h1>Панель управления</h1>
    <p>Создание кодов и управление доступами</p>
  </div>
  <div class="panel-body">
    
    <div class="stat-row" id="statRow">
      <div class="stat-item"><div class="stat-num" id="totalCodes">0</div><div class="stat-label">Всего кодов</div></div>
      <div class="stat-item"><div class="stat-num" id="activeCodes">0</div><div class="stat-label">Активных</div></div>
      <div class="stat-item"><div class="stat-num" id="expiredCodes">0</div><div class="stat-label">Истекших</div></div>
    </div>

    <div class="card">
      <div class="card-title"><span class="icon icon-green">K</span>Создать код доступа</div>
      <div class="input-row">
        <input type="text" id="name" placeholder="Имя клиента или номер чека">
        <select id="ttl">
          <option value="604800">7 дней</option>
          <option value="1209600">14 дней</option>
          <option value="2592000" selected>30 дней</option>
          <option value="7776000">3 месяца</option>
          <option value="31536000">1 год</option>
        </select>
        <button class="btn btn-primary" onclick="createCode()">Создать код</button>
      </div>
      <div class="code-display" id="codeDisplay">
        <div class="code" id="code"></div>
        <div class="meta" id="codeMeta"></div>
        <button class="btn btn-outline copy-btn" onclick="copyCode()">Скопировать код</button>
      </div>
      <div class="msg" id="msgCreate"></div>
    </div>

    <div class="card">
      <div class="card-title"><span class="icon icon-blue">H</span>История доступов</div>
      <div class="input-row" style="margin-bottom:12px;">
        <input type="text" id="searchInput" placeholder="Поиск по имени..." oninput="filterTable()">
        <button class="btn btn-outline" onclick="loadStats()" style="flex:0;">Обновить</button>
      </div>
      <div class="tabs">
        <div class="tab active" onclick="switchTab('active')">Активные</div>
        <div class="tab" onclick="switchTab('history')">История</div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Клиент</th><th>Код</th><th>Создан</th><th>Истекает</th><th>Статус</th><th></th></tr></thead>
          <tbody id="statsBody"><tr><td colspan="6" style="text-align:center;color:#94a3b8;padding:20px;">Загрузка...</td></tr></tbody>
        </table>
      </div>
      <div class="msg" id="msgStats"></div>
    </div>

    <div class="card">
      <div class="card-title"><span class="icon icon-red">X</span>Отозвать доступ</div>
      <div class="input-row">
        <input type="text" id="revokeName" placeholder="Имя клиента для отзыва">
        <button class="btn btn-danger" onclick="revokeAccess()">Отозвать доступ</button>
      </div>
      <div class="msg" id="msgRevoke"></div>
    </div>

  </div>
</div>

<script>
let adminPass = '';
let currentTab = 'active';
let allCodes = [];

async function login() {
    adminPass = document.getElementById('pass').value;
    const r = await fetch('/.netlify/functions/admin', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({pass:adminPass, name:'check', ttl:1})
    });
    if (r.ok) {
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('panel').style.display = 'block';
        loadStats();
    } else {
        document.getElementById('msgLogin').textContent = 'Неверный пароль';
    }
}

function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach((t,i) => {
        t.classList.toggle('active', (i===0 && tab==='active') || (i===1 && tab==='history'));
    });
    filterTable();
}

async function createCode() {
    const name = document.getElementById('name').value || 'User';
    const ttl = parseInt(document.getElementById('ttl').value);
    const btn = document.querySelector('.btn-primary');
    btn.disabled = true;
    document.getElementById('msgCreate').textContent = 'Создание...';
    
    const r = await fetch('/.netlify/functions/admin', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({pass:adminPass, name, ttl})
    });
    const data = await r.json();
    if (r.ok) {
        document.getElementById('code').textContent = data.code;
        const days = Math.round(ttl/86400);
        document.getElementById('codeMeta').textContent = 'Срок: ' + days + ' дн. | Клиент: ' + name;
        document.getElementById('codeDisplay').style.display = 'block';
        document.getElementById('msgCreate').textContent = 'Код создан';
        document.getElementById('name').value = '';
        loadStats();
    } else {
        document.getElementById('msgCreate').textContent = 'Ошибка создания';
    }
    btn.disabled = false;
}

function copyCode() {
    const code = document.getElementById('code').textContent;
    navigator.clipboard.writeText(code);
    alert('Код скопирован: ' + code);
}

async function revokeAccess() {
    const name = document.getElementById('revokeName').value.trim();
    if (!name) { document.getElementById('msgRevoke').textContent = 'Введите имя клиента'; return; }
    document.getElementById('msgRevoke').textContent = 'Отзыв...';
    
    const r = await fetch('/.netlify/functions/admin', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({pass:adminPass, name, action:'revoke'})
    });
    
    if (r.ok) {
        document.getElementById('msgRevoke').textContent = 'Доступ отозван: ' + name;
        document.getElementById('revokeName').value = '';
        loadStats();
    } else {
        document.getElementById('msgRevoke').textContent = 'Ошибка отзыва';
    }
}

async function loadStats() {
    allCodes = [];
    try {
        const r = await fetch('/.netlify/functions/admin', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({pass:adminPass, action:'list'})
        });
        if (r.ok) {
            const data = await r.json();
            allCodes = (data.codes || []).map(c => ({
                name: c.name,
                code: c.code,
                createdAt: new Date(c.createdAt),
                expiresAt: new Date(c.expiresAt),
                isActive: new Date(c.expiresAt) > new Date()
            }));
            allCodes.sort((a,b) => b.createdAt - a.createdAt);
        }
    } catch(e) {}
    
    document.getElementById('totalCodes').textContent = allCodes.length;
    document.getElementById('activeCodes').textContent = allCodes.filter(c => c.isActive).length;
    document.getElementById('expiredCodes').textContent = allCodes.filter(c => !c.isActive).length;
    filterTable();
}

function filterTable() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    let filtered = currentTab === 'active' ? allCodes.filter(c => c.isActive) : [...allCodes];
    if (query) filtered = filtered.filter(c => c.name.toLowerCase().includes(query));
    
    document.getElementById('statsBody').innerHTML = filtered.map(c => `
        <tr>
            <td><strong>${c.name}</strong></td>
            <td style="font-family:monospace;font-weight:600;">${c.code}</td>
            <td style="font-size:12px;">${c.createdAt.toLocaleString('ru-RU')}</td>
            <td style="font-size:12px;">${c.expiresAt.toLocaleString('ru-RU')}</td>
            <td>
                <span class="badge ${c.isActive ? 'badge-active' : c.expiresAt < new Date() ? 'badge-expired' : 'badge-used'}">${c.isActive ? 'Активен' : c.expiresAt < new Date() ? 'Истёк' : 'Использован'}</span>
            </td>
            <td>
                ${c.isActive ? `<button class="btn btn-danger btn-sm" onclick="document.getElementById('revokeName').value='${c.name}';revokeAccess();">Отозвать</button>` : ''}
            </td>
        </tr>
    `).join('') || '<tr><td colspan="6" style="text-align:center;color:#94a3b8;padding:20px;">Нет записей</td></tr>';
}
</script>
</body>
</html>
